<VirtualHost *:80>
    ServerName charm-by-sylora.ru
    ServerAlias www.charm-by-sylora.ru

    Alias /.well-known/acme-challenge/ /var/www/certbot/.well-known/acme-challenge/

    <Directory /var/www/certbot/.well-known/acme-challenge/>
        Options None
        AllowOverride None
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://charm-by-sylora.ru%{REQUEST_URI} [R=301,L,NE]

    ErrorLog ${APACHE_LOG_DIR}/charm-by-sylora-http.error.log
    CustomLog ${APACHE_LOG_DIR}/charm-by-sylora-http.access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName www.charm-by-sylora.ru

    SSLEngine On
    SSLCertificateFile /etc/letsencrypt/live/charm-by-sylora.ru/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/charm-by-sylora.ru/privkey.pem

    Redirect permanent / https://charm-by-sylora.ru/

    ErrorLog ${APACHE_LOG_DIR}/charm-by-sylora-www.error.log
    CustomLog ${APACHE_LOG_DIR}/charm-by-sylora-www.access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName charm-by-sylora.ru
    DocumentRoot /var/www/charm-by-sylora/upload
    DirectoryIndex index.php index.html
    Protocols h2 http/1.1

    SSLEngine On
    SSLCertificateFile /etc/letsencrypt/live/charm-by-sylora.ru/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/charm-by-sylora.ru/privkey.pem
    SSLProtocol -all +TLSv1.2 +TLSv1.3
    <Directory /var/www/charm-by-sylora/upload>
        Options FollowSymLinks -Indexes
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /var/www/charm-by-sylora/upload/system>
        Require all denied
    </Directory>

    <FilesMatch "(?i)^(?:config(?:-dist)?\.php|composer\.(?:json|lock)|package(?:-lock)?\.json|phpstan\.neon|\.env|.*\.(?:tpl|twig|ini|log))$">
        Require all denied
    </FilesMatch>

    <FilesMatch "\.php$">
        SetHandler "proxy:unix:/run/php/php8.5-fpm.sock|fcgi://localhost/"
    </FilesMatch>

    RequestHeader set X-Forwarded-Proto "https"
    AddDefaultCharset UTF-8
    LimitRequestBody 33554432

    ErrorLog ${APACHE_LOG_DIR}/charm-by-sylora.error.log
    CustomLog ${APACHE_LOG_DIR}/charm-by-sylora.access.log combined
</VirtualHost>
