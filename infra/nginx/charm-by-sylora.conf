server {
    listen 80;
    listen [::]:80;

    server_name charm-by-sylora.example.com www.charm-by-sylora.example.com;
    root /var/www/charmbysylora/upload;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 32m;

    access_log /var/log/nginx/charm-by-sylora.access.log;
    error_log /var/log/nginx/charm-by-sylora.error.log warn;

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        allow all;
        log_not_found off;
        access_log off;
    }

    location = /sitemap.xml {
        rewrite ^ /index.php?route=extension/feed/google_sitemap last;
    }

    location = /googlebase.xml {
        rewrite ^ /index.php?route=extension/feed/google_base last;
    }

    location = /config.php {
        deny all;
    }

    location = /admin/config.php {
        deny all;
    }

    location / {
        try_files $uri $uri/ @opencart_seo;
    }

    location @opencart_seo {
        rewrite ^/(.+)$ /index.php?_route_=$1 last;
    }

    location ~* \.(?:css|js|gif|ico|jpe?g|png|svg|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        try_files $uri =404;
    }

    location ~* \.(?:tpl|twig|ini|log)$ {
        deny all;
    }

    location ~* \.txt$ {
        deny all;
    }

    location ^~ /system/storage/ {
        return 404;
    }

    location ^~ /system/ {
        deny all;
    }

    location ~ /\. {
        deny all;
    }

    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
    }
}
