name: Lint

on:
  workflow_call:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.5']
    env:
      PHP_CS_FIXER_IGNORE_ENV: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run PHP checks
        uses: ./.github/actions/lint
        with:
          php-version: ${{ matrix.php }}
