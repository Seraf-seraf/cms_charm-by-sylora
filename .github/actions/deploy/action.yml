name: deploy
description: Update OpenCart dependencies and clear production caches.

inputs:
  host:
    description: SSH host.
    required: true
  user:
    description: SSH user.
    required: true
  password:
    description: SSH password.
    required: true
  port:
    description: SSH port.
    required: true
    default: "22"
  deploy-path:
    description: OpenCart directory on the remote host.
    required: true

runs:
  using: composite
  steps:
    - name: Deploy over SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ inputs.host }}
        username: ${{ inputs.user }}
        password: ${{ inputs.password }}
        port: ${{ inputs.port }}
        debug: true
        script: |
          set -eux

          export PATH="$HOME/bin:$PATH"

          cd "${{ inputs['deploy-path'] }}"

          git fetch origin main
          git reset --hard origin/main

          composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

          find upload/system/storage/cache storage/cache upload/image/cache -type f ! -name .gitkeep -delete 2>/dev/null || true
